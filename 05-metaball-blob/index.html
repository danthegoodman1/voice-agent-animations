<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morphing Blob — Voice Agent Animation</title>
<style>
  :root { color-scheme: dark }
  * { margin: 0; box-sizing: border-box }
  html, body { height: 100% }
  body {
    background: #08080d;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  canvas { display: block }
  header {
    position: fixed;
    top: 20px;
    left: 22px;
    z-index: 2;
  }
  header a {
    color: rgba(255,255,255,.6);
    text-decoration: none;
    font-size: 13px;
    transition: color .2s;
  }
  header a:hover { color: rgba(255,255,255,.9) }
  header .title {
    margin-top: 5px;
    font-size: 12px;
    letter-spacing: .05em;
    color: rgba(255,255,255,.6);
  }
  .controls {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 2;
    padding: 6px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.09);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .controls button {
    appearance: none;
    border: 0;
    padding: 8px 18px;
    border-radius: 999px;
    background: transparent;
    color: rgba(255,255,255,.55);
    font: 500 13px system-ui, sans-serif;
    cursor: pointer;
    transition: color .2s, background .2s;
  }
  .controls button:hover { color: rgba(255,255,255,.9) }
  .controls button.active {
    background: rgba(255,255,255,.92);
    color: #101018;
  }
  body.embed header, body.embed .controls { display: none }
</style>
</head>
<body>
<div id="stage"><canvas id="blob"></canvas></div>
<header>
  <a href="../">&larr; Gallery</a>
  <div class="title">Morphing Blob</div>
</header>
<nav class="controls" id="controls">
  <button data-state="idle">Idle</button>
  <button data-state="listening">Listening</button>
  <button data-state="working">Working</button>
  <button data-state="speaking">Speaking</button>
</nav>
<script>
'use strict'

const TAU = Math.PI * 2
const N = 28
const TRANSITION_MS = 500

const canvas = document.getElementById('blob')
const ctx = canvas.getContext('2d')
const stage = document.getElementById('stage')
const buttons = Array.from(document.querySelectorAll('#controls button'))

// Per-state targets. pal = three gradient stops (violet, pink, cyan) as flat RGB.
// envL/envS are weights for the listening/speaking envelopes, and spin/spinPulse
// drive the working state's rotating lobes; keeping them as lerped weights lets
// every state blend smoothly through transitions instead of switching formulas.
const STATES = {
  idle: {
    baseR: 0.80, low: 0.045, mid: 0.012, hi: 0.004,
    speed: 0.35, breath: 0.02, envL: 0, envS: 0, pulse: 0,
    bright: 0.72, glow: 0.45, spin: 0, spinPulse: 0,
    pal: [122, 92, 225, 186, 110, 196, 88, 168, 214]
  },
  listening: {
    baseR: 0.70, low: 0.02, mid: 0.045, hi: 0.03,
    speed: 1.1, breath: 0.008, envL: 1, envS: 0, pulse: 0.04,
    bright: 0.95, glow: 0.75, spin: 0, spinPulse: 0,
    pal: [138, 99, 255, 255, 116, 199, 72, 214, 255]
  },
  working: {
    baseR: 0.74, low: 0.02, mid: 0.015, hi: 0.006,
    speed: 0.6, breath: 0, envL: 0, envS: 0, pulse: 0,
    bright: 0.88, glow: 0.65, spin: 0.11, spinPulse: 0.022,
    pal: [126, 104, 245, 220, 110, 215, 76, 220, 240]
  },
  speaking: {
    baseR: 0.78, low: 0.09, mid: 0.07, hi: 0.055,
    speed: 2.4, breath: 0, envL: 0, envS: 1, pulse: 0.15,
    bright: 1, glow: 1, spin: 0, spinPulse: 0,
    pal: [165, 110, 255, 255, 80, 180, 64, 245, 255]
  }
}
const ORDER = ['idle', 'listening', 'working', 'speaking']
const KEYS = ['baseR', 'low', 'mid', 'hi', 'speed', 'breath', 'envL', 'envS', 'pulse', 'bright', 'glow', 'spin', 'spinPulse']
// Constant angular speed of the working state's 3-lobe pattern (rad/s).
const SPIN_RATE = 0.9

let state = 'idle'
const from = {}
const cur = {}
const fromPal = new Float32Array(9)
const curPal = new Float32Array(9)
for (const k of KEYS) { from[k] = STATES.idle[k]; cur[k] = STATES.idle[k] }
fromPal.set(STATES.idle.pal)
curPal.set(STATES.idle.pal)

const px = new Float32Array(N)
const py = new Float32Array(N)

let transStart = -1e9
let settled = false
let mainGrad = null
let glowGrad = null
let unit = 1
let W = 0
let H = 0
let phase = 0
let spinAngle = 0
let lastNow = performance.now()
let raf = 0

function clamp01(v) { return v < 0 ? 0 : v > 1 ? 1 : v }
function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2 }
function smoothstep(a, b, v) {
  const t = clamp01((v - a) / (b - a))
  return t * t * (3 - 2 * t)
}

// Fake mic level: layered incommensurate sines read as trembling input audio.
function envListen(t) {
  return clamp01(0.55 + 0.45 * (0.55 * Math.sin(t * 2.3) + 0.3 * Math.sin(t * 4.1 + 1.7) + 0.25 * Math.sin(t * 6.7 + 4.2)))
}

// Speech-like envelope: a slow gate creates bursts and pauses, a fast
// flutter inside each burst reads as syllables.
function envSpeak(t) {
  const slow = 0.6 * (0.5 + 0.5 * Math.sin(t * 1.7)) + 0.4 * (0.5 + 0.5 * Math.sin(t * 0.9 + 1.3))
  const gate = smoothstep(0.32, 0.62, slow)
  const flutter = clamp01(0.5 + 0.5 * (0.6 * Math.sin(t * 9.3) + 0.4 * Math.sin(t * 13.7 + 2.1)))
  return gate * (0.3 + 0.7 * flutter)
}

// Gradients live in unit space (blob radius ~0.8) so they survive resizes.
// Rebuilt only while a state transition is in flight — steady-state frames
// allocate nothing.
function rebuildGradients() {
  const p = curPal
  mainGrad = ctx.createLinearGradient(-0.85, -0.85, 0.85, 0.85)
  mainGrad.addColorStop(0, 'rgb(' + (p[0] | 0) + ',' + (p[1] | 0) + ',' + (p[2] | 0) + ')')
  mainGrad.addColorStop(0.5, 'rgb(' + (p[3] | 0) + ',' + (p[4] | 0) + ',' + (p[5] | 0) + ')')
  mainGrad.addColorStop(1, 'rgb(' + (p[6] | 0) + ',' + (p[7] | 0) + ',' + (p[8] | 0) + ')')
  glowGrad = ctx.createRadialGradient(0, 0, 0.25, 0, 0, 1.42)
  glowGrad.addColorStop(0, 'rgba(' + (p[3] | 0) + ',' + (p[4] | 0) + ',' + (p[5] | 0) + ',0.34)')
  glowGrad.addColorStop(0.55, 'rgba(' + (p[0] | 0) + ',' + (p[1] | 0) + ',' + (p[2] | 0) + ',0.14)')
  glowGrad.addColorStop(1, 'rgba(' + (p[6] | 0) + ',' + (p[7] | 0) + ',' + (p[8] | 0) + ',0)')
}

function resize() {
  const dpr = Math.min(2, window.devicePixelRatio || 1)
  const css = Math.min(window.innerWidth, window.innerHeight, 680) * 0.95
  canvas.style.width = css + 'px'
  canvas.style.height = css + 'px'
  W = Math.round(css * dpr)
  H = W
  canvas.width = W
  canvas.height = H
  unit = W / 2 / 1.45
}

function setState(name) {
  if (name === state) return
  for (const k of KEYS) from[k] = cur[k]
  fromPal.set(curPal)
  state = name
  transStart = performance.now()
  settled = false
  for (const b of buttons) b.classList.toggle('active', b.dataset.state === name)
}

function frame(now) {
  raf = requestAnimationFrame(frame)
  let dt = (now - lastNow) / 1000
  if (dt > 0.05) dt = 0.05
  lastNow = now
  const t = now / 1000

  const u = clamp01((now - transStart) / TRANSITION_MS)
  if (u < 1 || !settled) {
    const T = STATES[state]
    const e = ease(u)
    for (const k of KEYS) cur[k] = from[k] + (T[k] - from[k]) * e
    for (let i = 0; i < 9; i++) curPal[i] = fromPal[i] + (T.pal[i] - fromPal[i]) * e
    rebuildGradients()
    if (u >= 1) settled = true
  }

  phase += dt * cur.speed
  spinAngle += dt * SPIN_RATE
  const ph = phase

  const eL = envListen(t)
  const eS = envSpeak(t)
  const env = cur.envL * eL + cur.envS * eS
  // Envelope modulates ripple amplitude (surface trembling to sound) without
  // ever fully flattening the surface.
  const rippleMod = (1 - cur.envL * 0.65 * (1 - eL)) * (1 - cur.envS * 0.6 * (1 - eS))
  // Working: gentle size pulse locked to the rotating 3-lobe pattern period.
  const radius = cur.baseR * (1 + cur.breath * Math.sin(t * 0.7)) *
    (1 + cur.pulse * (env - 0.3)) * (1 + cur.spinPulse * Math.cos(3 * spinAngle))

  for (let i = 0; i < N; i++) {
    const a = i * TAU / N
    const lo = 0.6 * Math.sin(2 * a + ph * 0.7) + 0.4 * Math.sin(3 * a - ph * 1.1 + 2.1)
    const md = 0.5 * Math.sin(5 * a + ph * 1.6 + 1.0) + 0.5 * Math.sin(4 * a - ph * 1.3 + 3.4)
    const hi = 0.5 * Math.sin(7 * a + ph * 2.3 + 0.5) + 0.5 * Math.sin(9 * a - ph * 2.8 + 5.2)
    const lobes = Math.cos(3 * (a - spinAngle))
    const r = radius * (1 + cur.low * lo + (cur.mid * md + cur.hi * hi) * rippleMod + cur.spin * lobes)
    px[i] = Math.cos(a) * r
    py[i] = Math.sin(a) * r
  }

  ctx.setTransform(1, 0, 0, 1, 0, 0)
  ctx.clearRect(0, 0, W, H)
  ctx.setTransform(unit, 0, 0, unit, W / 2, H / 2)

  ctx.globalAlpha = clamp01(cur.glow * (0.75 + 0.25 * env))
  ctx.fillStyle = glowGrad
  ctx.fillRect(-1.45, -1.45, 2.9, 2.9)

  ctx.globalAlpha = clamp01(cur.bright)
  ctx.beginPath()
  ctx.moveTo((px[0] + px[1]) / 2, (py[0] + py[1]) / 2)
  // Quadratic curves through segment midpoints give a smooth closed outline.
  for (let i = 1; i <= N; i++) {
    const a = i % N
    const b = (i + 1) % N
    ctx.quadraticCurveTo(px[a], py[a], (px[a] + px[b]) / 2, (py[a] + py[b]) / 2)
  }
  ctx.closePath()
  ctx.fillStyle = mainGrad
  ctx.fill()
}

resize()
window.addEventListener('resize', resize)

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    cancelAnimationFrame(raf)
    raf = 0
  } else if (!raf) {
    lastNow = performance.now()
    raf = requestAnimationFrame(frame)
  }
})

for (const b of buttons) {
  b.addEventListener('click', () => setState(b.dataset.state))
}
buttons[0].classList.add('active')

function cycle() {
  setState(ORDER[(ORDER.indexOf(state) + 1) % ORDER.length])
}
stage.addEventListener('click', cycle)

window.addEventListener('keydown', e => {
  if (e.key === '1') setState('idle')
  else if (e.key === '2') setState('listening')
  else if (e.key === '3') setState('working')
  else if (e.key === '4') setState('speaking')
})

const embed = location.search.includes('embed')
let autoTimer = 0
function startAutoCycle() {
  if (!embed || autoTimer) return
  autoTimer = setInterval(cycle, 4000)
}
if (embed) {
  document.body.classList.add('embed')
  startAutoCycle()
}

// State control from a parent page embedding this one in an iframe
window.addEventListener('message', e => {
  const d = e.data
  if (!d || d.type !== 'voice-state') return
  if (d.state === 'auto') {
    startAutoCycle()
  } else if (ORDER.includes(d.state)) {
    clearInterval(autoTimer)
    autoTimer = 0
    setState(d.state)
  }
})

raf = requestAnimationFrame(frame)
</script>
</body>
</html>
