<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aurora Orb — Voice Agent Animation</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #08080d;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  header {
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 13px;
    color: rgba(255, 255, 255, .6);
  }
  header a {
    color: rgba(255, 255, 255, .6);
    text-decoration: none;
    transition: color .2s ease;
  }
  header a:hover { color: rgba(255, 255, 255, .95) }
  header .title { letter-spacing: .02em }

  .stage {
    width: min(74vmin, 600px);
    height: min(74vmin, 600px);
    cursor: pointer;
  }
  .stage canvas { width: 100%; height: 100%; display: block }

  .controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
    padding: 6px;
    border-radius: 999px;
    background: rgba(255, 255, 255, .05);
    border: 1px solid rgba(255, 255, 255, .08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .controls button {
    appearance: none;
    border: none;
    font: 500 13px/1 system-ui, -apple-system, "Segoe UI", sans-serif;
    letter-spacing: .02em;
    color: rgba(255, 255, 255, .55);
    background: transparent;
    padding: 9px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: color .25s ease, background .25s ease, box-shadow .25s ease;
  }
  .controls button:hover { color: rgba(255, 255, 255, .85) }
  .controls button.active {
    color: #0a0a12;
    background: rgba(255, 255, 255, .92);
    box-shadow: 0 0 18px rgba(140, 160, 255, .35);
  }

  body.embed header, body.embed .controls { display: none }
</style>
</head>
<body>

<header>
  <a href="../">&larr; Gallery</a>
  <span class="title">Aurora Orb</span>
</header>

<div class="stage"><canvas id="orb"></canvas></div>

<div class="controls" role="group" aria-label="Voice agent state">
  <button data-state="idle">Idle</button>
  <button data-state="listening">Listening</button>
  <button data-state="working">Working</button>
  <button data-state="speaking">Speaking</button>
</div>

<script>
'use strict'

const VERT = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`

const FRAG = `
precision highp float;

uniform vec2  u_res;
uniform float u_time;    // flow time, already scaled by state speed in JS
uniform float u_energy;  // turbulence amount
uniform float u_env;     // audio-like envelope, 0..1
uniform float u_bright;  // overall brightness
uniform float u_rim;     // rim/halo intensity
uniform float u_sat;     // color saturation
uniform float u_scale;   // breathing scale
uniform float u_spin;    // accumulated working rotation angle
uniform float u_work;    // working-state weight, 0..1

float wave(vec2 p) { return sin(p.x) * sin(p.y); }

// 3-octave sine fbm: cheap, smooth, band-limited
float fbm(vec2 p) {
  mat2 m = mat2(1.6, 1.2, -1.2, 1.6);
  float f = 0.5 * wave(p); p = m * p;
  f += 0.25 * wave(p); p = m * p;
  f += 0.125 * wave(p);
  return f * 1.1428;
}

void main() {
  vec2 uv = (gl_FragCoord.xy * 2.0 - u_res) / min(u_res.x, u_res.y);
  // the halo must reach exactly zero inside the canvas, or its clipped
  // square boundary becomes visible against the page background
  float edgeFade = 1.0 - smoothstep(0.80, 0.98, length(uv));
  uv /= u_scale;
  // orb occupies 74% of the canvas half-extent, leaving room for the halo
  float rr = length(uv) / 0.74;
  float t = u_time;

  vec2 p = uv * 3.1;
  float amp = 0.6 + u_energy * 1.4 + u_env * 1.3;

  // working state: differential rotation organizes the flow into a steady
  // vortex; the angle accumulates in JS only while working, so entering and
  // leaving the state never snaps the field
  float sa = u_spin * (1.35 - 0.55 * min(rr, 1.0));
  float cs = cos(sa), sn = sin(sa);
  p = mat2(cs, -sn, sn, cs) * p;

  // two-step domain warp gives the layered aurora flow
  vec2 q = vec2(
    fbm(p + vec2(0.0, 1.3) + t * vec2(0.31, -0.21)),
    fbm(p + vec2(4.8, 2.1) + t * vec2(-0.27, 0.36)));
  vec2 r2 = vec2(
    fbm(p + 2.2 * q + vec2(1.7, 9.2) + t * vec2(0.15, 0.13)),
    fbm(p + 2.2 * q + vec2(8.3, 2.8) + t * vec2(-0.12, 0.18)));
  float f = fbm(p + amp * r2);

  vec3 teal    = vec3(0.05, 0.85, 0.80);
  vec3 blue    = vec3(0.15, 0.35, 1.00);
  vec3 violet  = vec3(0.55, 0.25, 1.00);
  vec3 magenta = vec3(1.00, 0.25, 0.70);

  vec3 col = mix(teal, blue, smoothstep(-0.6, 0.6, q.x));
  col = mix(col, violet, smoothstep(-0.5, 0.7, r2.y) * 0.85);
  // hot magenta rises with sustained state energy, pulses with the envelope
  col = mix(col, magenta, smoothstep(0.1, 0.9, f) * min(0.25 + 0.45 * u_env + 0.35 * u_energy, 1.0));

  // bright filaments threading through the field
  float fil = 0.5 + 0.5 * sin(f * 6.0 + q.y * 4.0 + t * 0.6);
  col *= 0.5 + 0.9 * fil;

  // two soft luminous arms sweeping around the center while working
  float ang = atan(uv.y, uv.x);
  float arms = 0.5 + 0.5 * cos(ang * 2.0 - u_spin * 2.5);
  col *= 1.0 + u_work * 0.35 * arms * smoothstep(0.15, 0.8, rr);

  // soft core light, pumped by the envelope
  col += (0.16 + 0.5 * u_env) * pow(max(1.0 - rr, 0.0), 1.5) * vec3(0.7, 0.8, 1.0);

  float luma = dot(col, vec3(0.299, 0.587, 0.114));
  col = mix(vec3(luma), col, u_sat);
  col *= u_bright;

  // darken just inside the edge so the rim reads as luminous
  col *= 1.0 - 0.35 * smoothstep(0.6, 0.97, rr) * (1.0 - u_env);

  vec3 rimCol = mix(vec3(0.35, 0.85, 1.0), vec3(0.8, 0.5, 1.0), 0.5 + 0.5 * sin(t * 0.4));
  float rim = pow(smoothstep(0.35, 1.0, rr), 4.0);
  col += rim * u_rim * (0.5 + 0.5 * u_env) * rimCol;

  // soft tone map on the orb only, so highlights bloom gently
  col = 1.0 - exp(-col * 1.5);

  float body = 1.0 - smoothstep(0.985, 1.0, rr);
  vec3 bg = vec3(0.0314, 0.0314, 0.0510); // #08080d, matches the page
  vec3 outCol = mix(bg, col, body);

  // additive halo just outside the orb
  float halo = exp(-max(rr - 1.0, 0.0) * (6.0 - 2.5 * u_env)) * (1.0 - body);
  outCol += rimCol * halo * u_rim * (0.10 + 0.30 * u_env) * edgeFade;

  gl_FragColor = vec4(outCol, 1.0);
}
`

const canvas = document.getElementById('orb')
const stage = document.querySelector('.stage')
const gl = canvas.getContext('webgl', { alpha: false, antialias: false, depth: false, stencil: false })
if (!gl) throw new Error('WebGL unavailable')

function compileShader(type, src) {
  const s = gl.createShader(type)
  gl.shaderSource(s, src)
  gl.compileShader(s)
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error('Shader compile failed: ' + gl.getShaderInfoLog(s))
  }
  return s
}

const program = gl.createProgram()
gl.attachShader(program, compileShader(gl.VERTEX_SHADER, VERT))
gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, FRAG))
gl.linkProgram(program)
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  throw new Error('Program link failed: ' + gl.getProgramInfoLog(program))
}
gl.useProgram(program)

// one fullscreen triangle
const buf = gl.createBuffer()
gl.bindBuffer(gl.ARRAY_BUFFER, buf)
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW)
const aPos = gl.getAttribLocation(program, 'a_pos')
gl.enableVertexAttribArray(aPos)
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0)

const U = {}
for (const name of ['u_res', 'u_time', 'u_energy', 'u_env', 'u_bright', 'u_rim', 'u_sat', 'u_scale', 'u_spin', 'u_work']) {
  U[name] = gl.getUniformLocation(program, name)
}

function resize() {
  const rect = stage.getBoundingClientRect()
  const dpr = Math.min(window.devicePixelRatio || 1, 2)
  const w = Math.max(1, Math.round(rect.width * dpr))
  const h = Math.max(1, Math.round(rect.height * dpr))
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w
    canvas.height = h
    gl.viewport(0, 0, w, h)
  }
}
new ResizeObserver(resize).observe(stage)
resize()

// ---- state machine -------------------------------------------------------

const STATE_NAMES = ['idle', 'listening', 'working', 'speaking']
const STATE_PARAMS = {
  idle:      { energy: 0.15, speed: 0.28, bright: 0.55, rim: 0.35, sat: 0.65, breath: 0.020 },
  listening: { energy: 0.55, speed: 0.75, bright: 0.95, rim: 0.75, sat: 0.95, breath: 0.008 },
  working:   { energy: 0.35, speed: 0.55, bright: 0.90, rim: 0.65, sat: 0.90, breath: 0.006 },
  speaking:  { energy: 1.00, speed: 1.70, bright: 1.15, rim: 1.05, sat: 1.15, breath: 0.004 },
}

let state = 'idle'
// blend weights ease over ~0.5s so every uniform transitions smoothly
const weights = { idle: 1, listening: 0, working: 0, speaking: 0 }

const buttons = [...document.querySelectorAll('.controls button')]
function setState(next) {
  state = next
  for (const b of buttons) b.classList.toggle('active', b.dataset.state === next)
}
function cycleState() {
  setState(STATE_NAMES[(STATE_NAMES.indexOf(state) + 1) % STATE_NAMES.length])
}
setState('idle')

for (const b of buttons) b.addEventListener('click', () => setState(b.dataset.state))
document.addEventListener('click', e => {
  if (e.target.closest('.controls, header')) return
  cycleState()
})
document.addEventListener('keydown', e => {
  const i = ['1', '2', '3', '4'].indexOf(e.key)
  if (i !== -1) setState(STATE_NAMES[i])
})

let autoTimer = null
function startAutoCycle() {
  autoTimer = setInterval(cycleState, 4000)
}

if (location.search.includes('embed')) {
  document.body.classList.add('embed')
  startAutoCycle()
}

// Parent gallery drives state via postMessage: { type: 'voice-state', state }
window.addEventListener('message', e => {
  const d = e.data
  if (!d || d.type !== 'voice-state') return
  if (d.state === 'auto') {
    if (autoTimer === null && location.search.includes('embed')) startAutoCycle()
  } else if (STATE_NAMES.includes(d.state)) {
    if (autoTimer !== null) {
      clearInterval(autoTimer)
      autoTimer = null
    }
    setState(d.state)
  }
})

// ---- simulated audio envelopes -------------------------------------------

const clamp01 = v => Math.min(1, Math.max(0, v))

function idleEnv(t) {
  return 0.04 + 0.03 * (0.5 + 0.5 * Math.sin(t * 0.5))
}

// layered incommensurate sines read as a smooth wandering mic level
function listeningEnv(t) {
  return clamp01(0.45
    + 0.26 * Math.sin(t * 2.1)
    + 0.17 * Math.sin(t * 3.7 + 1.7)
    + 0.12 * Math.sin(t * 0.83 + 4.2)
    + 0.08 * Math.sin(t * 5.3 + 2.1))
}

// deliberately non-audio: a slow metronomic pulse, like machinery ticking over
function workingEnv(t) {
  return 0.3 + 0.22 * (0.5 - 0.5 * Math.cos(t * 4.7))
}

// random bursts separated by short pauses, with fast attack / slower release
const speech = { value: 0, target: 0, until: 0 }
function speakingEnv(t, dt) {
  if (t >= speech.until) {
    const pause = Math.random() < 0.3
    speech.target = pause ? 0.03 : 0.4 + Math.random() * 0.6
    speech.until = t + (pause ? 0.12 + Math.random() * 0.28 : 0.05 + Math.random() * 0.16)
  }
  const tau = speech.target > speech.value ? 0.03 : 0.09
  speech.value += (speech.target - speech.value) * (1 - Math.exp(-dt / tau))
  return speech.value
}

// ---- render loop ----------------------------------------------------------

let last = performance.now()
let flowTime = 0
let spinAngle = 0

function frame(now) {
  requestAnimationFrame(frame)
  if (document.hidden) { last = now; return }

  const dt = Math.min((now - last) / 1000, 0.05)
  last = now
  const t = now / 1000

  const k = 1 - Math.exp(-dt / 0.13)
  let sum = 0
  for (const n of STATE_NAMES) {
    weights[n] += ((n === state ? 1 : 0) - weights[n]) * k
    sum += weights[n]
  }
  for (const n of STATE_NAMES) weights[n] /= sum

  const p = { energy: 0, speed: 0, bright: 0, rim: 0, sat: 0, breath: 0 }
  for (const n of STATE_NAMES) {
    const s = STATE_PARAMS[n], w = weights[n]
    for (const key in p) p[key] += s[key] * w
  }

  // envelopes are crossfaded (not low-pass filtered) so speech chop survives
  const env = weights.idle * idleEnv(t)
    + weights.listening * listeningEnv(t)
    + weights.working * workingEnv(t)
    + weights.speaking * speakingEnv(t, dt)

  flowTime += dt * p.speed
  // constant angular speed while working; weight-gated so the vortex
  // spins up and coasts to a stop over the same ~0.5s as everything else
  spinAngle += dt * 0.9 * weights.working

  const scale = 1 + p.breath * Math.sin(t * 0.9) + weights.speaking * env * 0.02

  gl.uniform2f(U.u_res, canvas.width, canvas.height)
  gl.uniform1f(U.u_time, flowTime)
  gl.uniform1f(U.u_energy, p.energy)
  gl.uniform1f(U.u_env, env)
  gl.uniform1f(U.u_bright, p.bright)
  gl.uniform1f(U.u_rim, p.rim)
  gl.uniform1f(U.u_sat, p.sat)
  gl.uniform1f(U.u_scale, scale)
  gl.uniform1f(U.u_spin, spinAngle)
  gl.uniform1f(U.u_work, weights.working)
  gl.drawArrays(gl.TRIANGLES, 0, 3)
}
requestAnimationFrame(frame)
</script>
</body>
</html>
