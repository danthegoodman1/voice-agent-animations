<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liquid Gradient — Voice Agent Animation</title>
<style>
  :root {
    --orb: min(44vmin, 340px);
    --ease: cubic-bezier(.22, 1, .36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box }

  html, body { height: 100% }

  body {
    background: #08080d;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ---------- chrome ---------- */

  .chrome {
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 10;
  }

  .chrome a {
    color: rgba(255, 255, 255, .6);
    text-decoration: none;
    font-size: 13px;
    transition: color .2s ease;
  }

  .chrome a:hover { color: rgba(255, 255, 255, .95) }

  .chrome h1 {
    margin-top: 6px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, .6);
    letter-spacing: .02em;
  }

  .controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .controls button {
    appearance: none;
    font: 500 13px/1 system-ui, -apple-system, sans-serif;
    color: rgba(255, 255, 255, .55);
    background: rgba(255, 255, 255, .06);
    border: 1px solid rgba(255, 255, 255, .12);
    border-radius: 999px;
    padding: 9px 20px;
    cursor: pointer;
    transition: color .25s ease, background .25s ease, border-color .25s ease;
  }

  .controls button:hover {
    color: rgba(255, 255, 255, .85);
    background: rgba(255, 255, 255, .1);
  }

  .controls button.active {
    color: #fff;
    background: rgba(124, 77, 255, .32);
    border-color: rgba(151, 116, 255, .65);
  }

  body.embed .chrome,
  body.embed .controls { display: none }

  /* ---------- stage ---------- */

  .stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .scene {
    position: relative;
    width: var(--orb);
    height: var(--orb);
  }

  /* ---------- halo (blur is static, only opacity moves) ---------- */

  .halo {
    position: absolute;
    inset: -30%;
    border-radius: 50%;
    background:
      radial-gradient(closest-side, rgba(124, 77, 255, .55), rgba(41, 121, 255, .28) 45%, rgba(0, 229, 255, .12) 62%, transparent 75%);
    filter: blur(38px);
    pointer-events: none;
  }

  .halo-base {
    opacity: .2;
    transition: opacity .6s var(--ease);
  }

  .halo-pulse-wrap {
    position: absolute;
    inset: -30%;
    opacity: .1;
    transition: opacity .6s var(--ease);
    pointer-events: none;
  }

  .halo-pulse {
    inset: 0;
    animation: heartbeat 1.7s ease-in-out infinite;
    will-change: opacity;
  }

  .state-listening .halo-base { opacity: .5 }
  .state-listening .halo-pulse-wrap { opacity: .9 }

  /* steady halo, no heartbeat: working is regular, not audio-reactive */
  .state-working .halo-base { opacity: .45 }

  .state-speaking .halo-base { opacity: .95 }
  .state-speaking .halo-pulse-wrap { opacity: .4 }

  /* lub-dub double beat, then rest */
  @keyframes heartbeat {
    0%   { opacity: .12 }
    12%  { opacity: .95 }
    24%  { opacity: .3 }
    37%  { opacity: .72 }
    58%  { opacity: .12 }
    100% { opacity: .12 }
  }

  /* ---------- orb ---------- */

  /* base scale per state; the pulse animation lives one wrapper deeper so
     the two transforms compose without fighting each other */
  .orb-size {
    position: absolute;
    inset: 0;
    transition: transform .55s var(--ease);
  }

  .state-listening .orb-size { transform: scale(.95) }

  .orb-pulse {
    position: absolute;
    inset: 0;
    animation: breath 7s ease-in-out infinite;
    will-change: transform;
  }

  .state-listening .orb-pulse { animation: attend 1.7s ease-in-out infinite }
  .state-working   .orb-pulse { animation: breath 3.2s ease-in-out infinite }
  .state-speaking  .orb-pulse { animation: speak 1.9s ease-in-out infinite }

  @keyframes breath {
    0%, 100% { transform: scale(1) }
    50%      { transform: scale(1.025) }
  }

  @keyframes attend {
    0%, 100% { transform: scale(1) }
    14%      { transform: scale(1.018) }
    30%      { transform: scale(1.004) }
  }

  /* uneven keyframe spacing fakes speech cadence */
  @keyframes speak {
    0%   { transform: scale(1) }
    9%   { transform: scale(1.055) }
    17%  { transform: scale(.985) }
    26%  { transform: scale(1.04) }
    34%  { transform: scale(1.005) }
    45%  { transform: scale(1.065) }
    56%  { transform: scale(.98) }
    63%  { transform: scale(1.03) }
    74%  { transform: scale(1.05) }
    85%  { transform: scale(.99) }
    100% { transform: scale(1) }
  }

  .orb {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 42%, #2b2070, #171142 55%, #0c0925 100%);
    box-shadow:
      0 0 70px rgba(90, 60, 255, .3),
      inset 0 0 50px rgba(15, 8, 50, .7);
    border: 1px solid rgba(160, 140, 255, .16);
  }

  /* ---------- swirl layers ----------
     Each blob spins forever at a fixed speed; states cross-fade between
     them with opacity instead of retargeting animation-duration, so a
     "speed change" never restarts or snaps an animation mid-flight. */

  .blob {
    position: absolute;
    width: 150%;
    height: 150%;
    left: -25%;
    top: -25%;
    border-radius: 50%;
    mix-blend-mode: screen;
    transition: opacity .7s var(--ease);
    will-change: transform, opacity;
  }

  .blob-a {
    background:
      radial-gradient(38% 42% at 30% 32%, rgba(124, 77, 255, .9), transparent 70%),
      radial-gradient(45% 40% at 72% 68%, rgba(41, 98, 255, .75), transparent 70%),
      radial-gradient(52% 56% at 56% 28%, rgba(64, 30, 170, .85), transparent 75%);
    animation: swirl-a 44s linear infinite;
    opacity: .55;
  }

  .blob-b {
    background:
      radial-gradient(34% 30% at 68% 40%, rgba(0, 229, 255, .8), transparent 70%),
      radial-gradient(28% 34% at 30% 66%, rgba(24, 255, 222, .45), transparent 70%),
      conic-gradient(from 90deg, transparent 0deg, rgba(0, 180, 255, .32) 45deg, transparent 115deg, rgba(80, 120, 255, .28) 205deg, transparent 265deg);
    animation: swirl-b 15s linear infinite;
    opacity: .16;
  }

  .blob-c {
    background:
      radial-gradient(30% 26% at 62% 32%, rgba(255, 62, 240, .85), transparent 68%),
      radial-gradient(24% 30% at 34% 70%, rgba(255, 0, 128, .5), transparent 70%),
      conic-gradient(from 0deg, transparent 0deg, rgba(255, 62, 240, .38) 62deg, transparent 145deg, rgba(0, 229, 255, .32) 225deg, transparent 300deg);
    animation: swirl-c 6.5s linear infinite;
    opacity: .05;
  }

  .state-listening .blob-a { opacity: .85 }
  .state-listening .blob-b { opacity: .9 }
  .state-listening .blob-c { opacity: .3 }

  .state-working .blob-a { opacity: .7 }
  .state-working .blob-b { opacity: .5 }
  .state-working .blob-c { opacity: .12 }

  .state-speaking .blob-a { opacity: .95 }
  .state-speaking .blob-b { opacity: 1 }
  .state-speaking .blob-c { opacity: 1 }

  @keyframes swirl-a {
    0%   { transform: rotate(0turn)   translate(4%, -3%) scale(1) }
    25%  { transform: rotate(.25turn) translate(-3%, 5%) scale(1.06) }
    50%  { transform: rotate(.5turn)  translate(-5%, -4%) scale(.97) }
    75%  { transform: rotate(.75turn) translate(3%, 4%) scale(1.04) }
    100% { transform: rotate(1turn)   translate(4%, -3%) scale(1) }
  }

  @keyframes swirl-b {
    0%   { transform: rotate(0turn)    translate(-4%, 4%) scale(1) }
    25%  { transform: rotate(-.25turn) translate(5%, -3%) scale(.96) }
    50%  { transform: rotate(-.5turn)  translate(3%, 5%) scale(1.05) }
    75%  { transform: rotate(-.75turn) translate(-5%, -3%) scale(1) }
    100% { transform: rotate(-1turn)   translate(-4%, 4%) scale(1) }
  }

  @keyframes swirl-c {
    0%   { transform: rotate(0turn)   translate(3%, 4%) scale(1) }
    33%  { transform: rotate(.33turn) translate(-4%, -3%) scale(1.07) }
    66%  { transform: rotate(.66turn) translate(4%, -4%) scale(.95) }
    100% { transform: rotate(1turn)   translate(3%, 4%) scale(1) }
  }

  /* static glass highlight + rim vignette for depth */
  .sheen {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(60% 38% at 50% 12%, rgba(255, 255, 255, .15), transparent 60%),
      radial-gradient(120% 120% at 50% 50%, transparent 52%, rgba(10, 8, 32, .5) 78%, rgba(5, 4, 20, .78) 100%);
    pointer-events: none;
  }

  /* ---------- working sweep ----------
     A comet-like conic highlight confined to the rim by a static annulus
     mask. It spins forever; .state-working only fades it in, so entering
     the state never restarts the animation. Sits above the sheen so the
     rim vignette doesn't dim it. */

  .sweep {
    position: absolute;
    inset: 2%;
    border-radius: 50%;
    background:
      conic-gradient(from 0deg,
        transparent 0deg,
        transparent 250deg,
        rgba(0, 229, 255, .06) 275deg,
        rgba(90, 180, 255, .5) 330deg,
        rgba(200, 245, 255, .95) 354deg,
        transparent 356deg);
    -webkit-mask: radial-gradient(closest-side, transparent 76%, #000 86%, #000 96%, transparent 100%);
    mask: radial-gradient(closest-side, transparent 76%, #000 86%, #000 96%, transparent 100%);
    mix-blend-mode: screen;
    animation: sweep 2.6s linear infinite;
    opacity: 0;
    transition: opacity .6s var(--ease);
    will-change: transform, opacity;
    pointer-events: none;
  }

  .state-working .sweep { opacity: 1 }

  @keyframes sweep {
    from { transform: rotate(0turn) }
    to   { transform: rotate(1turn) }
  }
</style>
</head>
<body class="state-idle">

<header class="chrome">
  <a href="../">&larr; Gallery</a>
  <h1>Liquid Gradient</h1>
</header>

<main class="stage" aria-label="Voice agent animation">
  <div class="scene">
    <div class="halo halo-base"></div>
    <div class="halo-pulse-wrap"><div class="halo halo-pulse"></div></div>
    <div class="orb-size">
      <div class="orb-pulse">
        <div class="orb">
          <div class="blob blob-a"></div>
          <div class="blob blob-b"></div>
          <div class="blob blob-c"></div>
          <div class="sheen"></div>
          <div class="sweep"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<nav class="controls" aria-label="Animation state">
  <button type="button" data-state="idle" class="active">Idle</button>
  <button type="button" data-state="listening">Listening</button>
  <button type="button" data-state="working">Working</button>
  <button type="button" data-state="speaking">Speaking</button>
</nav>

<script>
  const states = ['idle', 'listening', 'working', 'speaking']
  const buttons = Array.from(document.querySelectorAll('.controls button'))
  let current = 'idle'

  function setState(name) {
    current = name
    for (const s of states) document.body.classList.toggle('state-' + s, s === name)
    for (const b of buttons) b.classList.toggle('active', b.dataset.state === name)
  }

  function cycle() {
    setState(states[(states.indexOf(current) + 1) % states.length])
  }

  for (const b of buttons) b.addEventListener('click', () => setState(b.dataset.state))

  document.querySelector('.stage').addEventListener('click', cycle)

  addEventListener('keydown', e => {
    const i = ['1', '2', '3', '4'].indexOf(e.key)
    if (i !== -1) setState(states[i])
  })

  let autoTimer = 0

  if (location.search.includes('embed')) {
    document.body.classList.add('embed')
    autoTimer = setInterval(cycle, 4000)
  }

  // Parent gallery pages drive state via postMessage; an explicit state stops
  // the embed auto-cycle for good, "auto" resumes it.
  addEventListener('message', e => {
    const msg = e.data
    if (!msg || msg.type !== 'voice-state') return
    if (states.includes(msg.state)) {
      clearInterval(autoTimer)
      autoTimer = 0
      setState(msg.state)
    } else if (msg.state === 'auto' && !autoTimer && document.body.classList.contains('embed')) {
      autoTimer = setInterval(cycle, 4000)
    }
  })
</script>

</body>
</html>
